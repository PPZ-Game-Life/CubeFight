<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CubeFight - Cube Arena</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: #1a1a2e;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      pointer-events: auto;
      background: rgba(0,0,0,0.3);
      padding: 10px 20px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    #info {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 14px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      pointer-events: auto;
      background: rgba(0,0,0,0.3);
      padding: 10px 15px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      text-align: right;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      pointer-events: auto;
    }
    .control-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    #slice-controls {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }
    .slice-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    .slice-label {
      color: white;
      font-size: 12px;
      text-align: center;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .slice-buttons {
      display: flex;
      gap: 5px;
    }
    .slice-buttons.vertical {
      flex-direction: column;
    }
    .slice-buttons.horizontal {
      flex-direction: row;
    }
    .slice-btn {
      min-width: 44px;
      height: 40px;
      padding: 0 10px;
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    #bottom-slice-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      background: rgba(0,0,0,0.3);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    .slice-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    .slice-btn.active {
      background: rgba(59, 130, 246, 0.8);
      border-color: #3b82f6;
    }
    .btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
